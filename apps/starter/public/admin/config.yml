# Sveltia CMS configuration — MixtureMarketing klient template
#
# Edits commit directly to klient's git repo. Astro picks up new content
# at next build (or via SSR for content collections under server output).
#
# Auth modes:
#   - dev:     `local` backend via `npx @sveltia/cms-proxy-server` (no auth, fs writes)
#   - prod:    `github` backend via OAuth proxy at api.mixturemarketing.pl/api/sveltia

# === Backend ===================================================================
# Production: GitHub via OAuth proxy. Sveltia popup → /api/sveltia/auth → GitHub →
# /api/sveltia/callback → returns access_token via postMessage to popup opener.
#
# Per-klient deploys MUST update `repo:` to point at klient's own MixtureMarketing/{slug}-site repo.
# Provisioning workflow (Track 4) generates this YAML with correct repo string baked in.
backend:
  name: github
  repo: MixtureMarketing/CHANGE-ME-PER-KLIENT
  branch: main
  base_url: https://api.mixturemarketing.pl/api/sveltia
  auth_endpoint: auth

# Local dev: when running `npx @sveltia/cms-proxy-server` on localhost,
# Sveltia auto-detects and uses local-fs backend.
local_backend: true

# === Media =====================================================================
media_folder: apps/starter/public/content/uploads
public_folder: /content/uploads

# === Editorial workflow (draft → review → publish) =============================
publish_mode: editorial_workflow

# === Logo + UI =================================================================
logo_url: /favicon.svg
site_url: https://kowalski-slusarz.pl
display_url: https://kowalski-slusarz.pl
locale: pl

# === Collections ===============================================================
collections:
  # ---- BLOG / AKTUALNOŚCI ---------------------------------------------------
  - name: posts
    label: Aktualności
    label_singular: Wpis
    folder: apps/starter/content/posts
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    view_filters:
      - label: Opublikowane
        field: published
        pattern: true
      - label: Szkice
        field: published
        pattern: false
    fields:
      - { label: Tytuł, name: title, widget: string, hint: "Max 180 znaków" }
      - { label: Data publikacji, name: date, widget: datetime, time_format: false }
      - { label: Streszczenie (excerpt), name: excerpt, widget: text, required: false, hint: "Pokazuje się w listingu — max 300 znaków" }
      - { label: Obraz okładkowy, name: coverImage, widget: image, required: false }
      - label: Tagi
        name: tags
        widget: list
        required: false
        default: []
        hint: "Po przecinku — np. otwieranie-zamkow, awaryjne"
      - { label: Opublikowany, name: published, widget: boolean, default: true }
      - { label: Treść, name: body, widget: markdown }

  # ---- FAQ ----------------------------------------------------------------
  - name: faq
    label: FAQ
    label_singular: Pytanie
    folder: apps/starter/content/faq
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{question}}"
    sortable_fields: [order, question]
    fields:
      - { label: Pytanie, name: question, widget: string }
      - { label: Kolejność, name: order, widget: number, value_type: int, min: 0, default: 99 }
      - { label: Opublikowane, name: published, widget: boolean, default: true }
      - { label: Odpowiedź, name: body, widget: markdown }

  # ---- GALERIA -------------------------------------------------------------
  - name: gallery
    label: Galeria
    label_singular: Zdjęcie
    folder: apps/starter/content/gallery
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{caption}}"
    extension: json
    format: json
    fields:
      - { label: Zdjęcie, name: image, widget: image }
      - { label: Podpis, name: caption, widget: string, required: false }
      - { label: Kolejność, name: order, widget: number, value_type: int, min: 0, default: 99 }

  # ---- ZESPÓŁ -------------------------------------------------------------
  - name: team
    label: Zespół
    label_singular: Osoba
    folder: apps/starter/content/team
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    sortable_fields: [order, name]
    fields:
      - { label: Imię i nazwisko, name: name, widget: string, hint: "np. adw. Krzysztof Wiśniewski" }
      - { label: Rola / funkcja, name: role, widget: string, hint: "np. Partner zarządzający, Stylistka, Szef kuchni" }
      - { label: Krótkie bio, name: bio, widget: text, required: false, hint: "Max 800 znaków — 2-3 zdania o doświadczeniu/specjalizacji" }
      - { label: Zdjęcie, name: photo, widget: image, required: false, hint: "Kwadratowe, min 400×400 px. Brak = inicjały na brand color." }
      - { label: Kolejność wyświetlania, name: order, widget: number, value_type: int, min: 0, default: 99 }
      - { label: Opublikowany, name: published, widget: boolean, default: true }

  # ---- PUBLIKACJE (Professional tier) -------------------------------------
  - name: publications
    label: Publikacje
    label_singular: Publikacja
    folder: apps/starter/content/publications
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{date}} · {{title}}"
    sortable_fields: [date, title, order]
    fields:
      - { label: Tytuł, name: title, widget: string, hint: "Max 220 znaków" }
      - { label: Źródło (gazeta/wydawnictwo/konferencja), name: source, widget: string, hint: "np. Rzeczpospolita, Wydawnictwo C.H. Beck, VII Kongres Prawa Gospodarczego" }
      - { label: Data, name: date, widget: string, hint: "Format: 2026-03, 2026, lub 2026-03-15" }
      - { label: URL (opcjonalne), name: url, widget: string, required: false }
      - label: Typ publikacji
        name: type
        widget: select
        required: false
        options:
          - { label: Artykuł, value: article }
          - { label: Książka, value: book }
          - { label: Wywiad, value: interview }
          - { label: Wystąpienie, value: speech }
          - { label: Podcast, value: podcast }
      - { label: Kolejność, name: order, widget: number, value_type: int, min: 0, default: 99 }
      - { label: Opublikowane, name: published, widget: boolean, default: true }

  # ---- HISTORIA FIRMY (singleton) -----------------------------------------
  - name: history
    label: Historia firmy
    files:
      - label: Treść historii
        name: main
        file: apps/starter/content/history/main.md
        fields:
          - { label: Nagłówek, name: heading, widget: string, required: false, hint: "Domyślnie: 'Nasza historia'" }
          - { label: Cytat wyróżniony (pull quote), name: pullQuote, widget: text, required: false, hint: "Krótki, mocny cytat — pokazany dużą czcionką italic" }
          - { label: Podpis autora, name: authorByline, widget: string, required: false, hint: "np. Marco Bocca, szef kuchni" }
          - { label: Włącz drop cap (duża 1. litera), name: dropCap, widget: boolean, default: false, hint: "Tylko dla Magazynowego — wygląda magazynowo" }
          - { label: Zdjęcie nagłówkowe, name: imageUrl, widget: image, required: false }
          - { label: Podpis pod zdjęciem, name: imageCaption, widget: string, required: false }
          - label: Ornament rozdzielający
            name: ornament
            widget: select
            default: none
            options:
              - { label: "— brak —", value: none }
              - { label: "Trzy kropki", value: divider-3-dots }
              - { label: "Diament + linia", value: divider-diamond }
              - { label: "Fleuron (klasyczny)", value: divider-fleuron }
              - { label: "Asteryzm ⁂", value: divider-asterism }
              - { label: "Hairline (cienka linia)", value: divider-hairline }
          - { label: Treść (markdown), name: body, widget: markdown, hint: "Długi tekst, można używać **bold**, *italic*, ## nagłówki" }

  # ---- OVERRIDES (singleton — promo banner, hero override) ----------------
  - name: site
    label: Ustawienia strony
    files:
      - label: Overrides
        name: overrides
        file: apps/starter/content/site/overrides.json
        fields:
          - label: Hero override (zostaw puste = domyślne z client.config)
            name: heroOverride
            widget: object
            required: false
            collapsed: true
            fields:
              - { label: Tytuł, name: title, widget: string, required: false }
              - { label: Podtytuł, name: subtitle, widget: text, required: false }
              - { label: Obraz tła, name: image, widget: image, required: false }
          - label: Promo banner (na górze strony)
            name: promoBanner
            widget: object
            fields:
              - { label: Włączony, name: enabled, widget: boolean, default: false }
              - { label: Tekst, name: text, widget: string, required: false, default: "" }
              - { label: CTA — etykieta, name: ctaLabel, widget: string, required: false, default: "" }
              - { label: CTA — link, name: ctaHref, widget: string, required: false, default: "" }
          - label: Pasek ogłoszeń (pod nawigacją)
            name: announcementBar
            widget: object
            fields:
              - { label: Włączony, name: enabled, widget: boolean, default: false }
              - { label: Tekst, name: text, widget: string, required: false, default: "" }
