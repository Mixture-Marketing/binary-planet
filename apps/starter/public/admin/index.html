<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CMS — MixtureMarketing</title>
    <style>
      /* Force a font with full Polish glyph coverage. Sveltia bundles fonts that
         render Polish diacritics (ć ś ż ź ł ń ó ą ę) as boxes on some platforms. */
      :root, body, body *, body * input, body * textarea, body * select, body * button {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
      }
      /* Keep monospace for code/markdown editor */
      body pre, body code, body textarea[class*="code"], body [class*="monospace"], body [class*="codemirror"] {
        font-family: ui-monospace, "SF Mono", Consolas, "Liberation Mono", monospace !important;
      }
      body { margin: 0; }
      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="boot">Ładowanie panelu treści…</div>
    <!--
      Sveltia CMS — git-based headless CMS (fork of Decap/Netlify CMS).
      Loaded from CDN, single-page app. Reads /admin/config.yml for collections.
      Auth: in dev → local backend via `npx @sveltia/cms-proxy-server`.
              In prod (v0.2) → GitHub OAuth via Worker proxy at /api/auth/github.
    -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  </body>
</html>
