# wrangler.toml — mm-admin (Astro CF Workers)
# Shared D1 + KV with mm-control-plane — same bindings, same instance IDs.

name = "mm-admin"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./dist", binding = "ASSETS" }

# Custom domain: app.mixturemarketing.pl (Faza 1 after CF Workers Paid + DNS)
# routes = [
#   { pattern = "app.mixturemarketing.pl/*", custom_domain = true },
# ]

# ---------------------------------------------------------------------------
# D1 — shared with mm-control-plane (same database_id)
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "mm-control-plane"
# Production: replace this UUID with real CF D1 database_id.
# Local dev: any non-empty value works — wrangler creates local SQLite anyway.
database_id = "00000000-0000-0000-0000-000000000001"
# In local dev: applies the same SQL schema as control-plane (sibling app).
migrations_dir = "../control-plane/migrations"

# ---------------------------------------------------------------------------
# KV — shared with mm-control-plane
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "CONFIG"
# Production: replace with real KV namespace_id. Local: any value works.
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "ADMIN_SESSIONS"
id = "00000000000000000000000000000002"

# ---------------------------------------------------------------------------
# R2 — shared with mm-control-plane
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "mm-uploads"

# ---------------------------------------------------------------------------
# Vars
# ---------------------------------------------------------------------------
[vars]
HUB_BASE_URL = "https://api.mixturemarketing.pl"
LOG_LEVEL = "info"

# Secrets (via wrangler secret put):
# - RESEND_API_KEY (for magic link emails)
# - RESEND_FROM ("admin@mixturemarketing.pl")
# - SESSION_SIGNING_KEY (HMAC secret for session cookies)
# - D1_ENCRYPTION_KEY (decrypts PII when admin views leads)
