# wrangler.toml — mm-panel (Astro CF Workers)
# Shared D1 with mm-control-plane + mm-admin (same DB instance, same bindings).

name = "mm-panel"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./dist", binding = "ASSETS" }

# Custom domain: panel.mixturemarketing.pl (Faza 1)
# routes = [{ pattern = "panel.mixturemarketing.pl/*", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "mm-control-plane"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "../control-plane/migrations"

[[kv_namespaces]]
binding = "CONFIG"
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "PANEL_SESSIONS"
id = "00000000000000000000000000000003"

[[r2_buckets]]
binding = "INVOICES"
bucket_name = "mm-invoices"

[vars]
HUB_BASE_URL = "https://api.mixturemarketing.pl"
LOG_LEVEL = "info"

# Secrets (wrangler secret put):
# - RESEND_API_KEY
# - RESEND_FROM ("panel@mixturemarketing.pl")
# - SESSION_SIGNING_KEY
# - D1_ENCRYPTION_KEY (decrypts lead PII for klient display)
