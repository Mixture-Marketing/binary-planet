name: Deploy Demos

# Redeploy 4 marketing demo Workers (demo-{minimalist,elegant,dynamic,editorial}
# .mixturemarketing.pl). Triggered manually after starter changes that affect demos.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN (Workers Edit + Account:Read)
#   CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:
    inputs:
      themes:
        description: "Comma-separated themes to deploy (empty = all 4)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "apps/starter/src/**"
      - "apps/starter/demo-fixtures/**"
      - "packages/web-core/**"
      - "apps/starter/wrangler.jsonc"
      - "apps/starter/astro.config.mjs"

concurrency:
  group: deploy-demos
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web-core
        run: pnpm --filter @mixturemarketing/web-core build

      - name: Deploy demos
        working-directory: apps/starter
        run: |
          THEMES="${{ github.event.inputs.themes }}"
          if [ -z "$THEMES" ]; then
            node scripts/deploy-demos.mjs
          else
            node scripts/deploy-demos.mjs $(echo "$THEMES" | tr ',' ' ')
          fi
