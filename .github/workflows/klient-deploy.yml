name: Klient Site Deploy

# Deploys apps/starter (klient website) to Cloudflare Workers.
#
# Triggered by:
#   1. push to main with changes in apps/starter/** (auto-redeploy on klient edits)
#   2. workflow_dispatch (manual + called by hub Track 4 provisioning)
#
# Klient repos generated by Track 4 (`POST /repos/.../generate`) inherit this
# workflow. Each klient repo runs its OWN deploy with its OWN secrets.
#
# Required repo secrets (set per klient repo or org-level):
#   - CF_API_TOKEN        — CF API token with Workers Scripts:Edit + DNS:Edit
#   - CF_ACCOUNT_ID       — CF account ID (32 hex)
#   - BP_CLIENT_API_KEY   — klient's hub API key for lead forwarding (per-klient)
#   - RESEND_API_KEY      — for backup email fan-out
#   - SMSAPI_TOKEN        — for SMS lead notifications
#   - TURNSTILE_SECRET    — for anti-bot

on:
  push:
    branches: [main]
    paths:
      - "apps/starter/**"
      - "packages/web-core/**"
      - "packages/logger/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/klient-deploy.yml"
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Worker name (e.g. mm-starter-kowalski)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Skip workflow on the template repo itself — only klient repos should auto-deploy.
    # Binary-planet template doesn't have Worker bindings and CF org secrets won't pass through
    # to private repos on GitHub Free anyway.
    if: github.event.repository.name != 'binary-planet'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # GitHub Packages auth — repo PAT bot. Optional, only if any private deps.
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        # web-core + logger must be built first (mm-starter imports their compiled dist/)
        run: pnpm -r --filter "./packages/*" build
        env:
          NODE_ENV: production

      - name: Build mm-starter
        run: pnpm --filter mm-starter build
        env:
          NODE_ENV: production
          # @astrojs/cloudflare v13 + vite-plugin tries to start wrangler remote proxy
          # session at build time to fetch CF binding types. Without these env vars
          # it errors "You must be logged in to use wrangler dev in remote mode".
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Determine Worker name
        id: worker
        run: |
          if [ -n "${{ inputs.worker_name }}" ]; then
            echo "name=${{ inputs.worker_name }}" >> "$GITHUB_OUTPUT"
          else
            # Derive from repo name: MixtureMarketing/kowalski-slusarz-site → mm-starter-kowalski-slusarz
            REPO_NAME="${{ github.event.repository.name }}"
            SUFFIX="${REPO_NAME%-site}"
            echo "name=mm-starter-$SUFFIX" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Worker secrets
        # Idempotent — wrangler secret put overwrites existing
        run: |
          cd apps/starter
          if [ -n "$BP_CLIENT_API_KEY" ]; then
            echo "$BP_CLIENT_API_KEY" | pnpm exec wrangler secret put BP_CLIENT_API_KEY --name "${{ steps.worker.outputs.name }}"
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | pnpm exec wrangler secret put RESEND_API_KEY --name "${{ steps.worker.outputs.name }}"
          fi
          if [ -n "$SMSAPI_TOKEN" ]; then
            echo "$SMSAPI_TOKEN" | pnpm exec wrangler secret put SMSAPI_TOKEN --name "${{ steps.worker.outputs.name }}"
          fi
          if [ -n "$TURNSTILE_SECRET" ]; then
            echo "$TURNSTILE_SECRET" | pnpm exec wrangler secret put TURNSTILE_SECRET --name "${{ steps.worker.outputs.name }}"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BP_CLIENT_API_KEY: ${{ secrets.BP_CLIENT_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMSAPI_TOKEN: ${{ secrets.SMSAPI_TOKEN }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
        continue-on-error: true   # If secrets aren't set, deploy still goes but with dev-mode behavior

      - name: Create .assetsignore (Astro CF adapter outputs _worker.js/ as directory)
        run: |
          cd apps/starter/dist
          printf "_worker.js\n_routes.json\n" > .assetsignore
          cat .assetsignore

      - name: Deploy Worker
        run: |
          cd apps/starter
          pnpm exec wrangler deploy --name "${{ steps.worker.outputs.name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Notify hub of deploy success
        if: success()
        run: |
          curl -s -X POST \
            -H "X-BP-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"worker_name":"${{ steps.worker.outputs.name }}","status":"deployed","commit":"${{ github.sha }}"}' \
            https://api.mixturemarketing.pl/api/admin/deploy-notify || true
